<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Servedia Ops Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0d0d;color:#e5e5e5;font-family:'Inter',system-ui,sans-serif;min-height:100vh}
  a{color:inherit;text-decoration:none}
  .header{background:#111;border-bottom:1px solid #222;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .header h1{font-size:18px;font-weight:700;letter-spacing:-.3px;color:#fff}
  .header h1 span{color:#7c5cfc}
  .pulled-at{font-size:11px;color:#555;margin-top:2px}
  .refresh-btn{background:#1e1e1e;border:1px solid #333;color:#aaa;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s}
  .refresh-btn:hover{background:#2a2a2a;color:#fff}
  .tabs{display:flex;gap:4px;padding:16px 28px 0;border-bottom:1px solid #1e1e1e}
  .tab{padding:8px 18px;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:500;color:#666;border:1px solid transparent;border-bottom:none;transition:all .2s;position:relative;bottom:-1px}
  .tab.active{background:#111;border-color:#222;color:#fff}
  .tab:hover:not(.active){color:#aaa}
  .tab-badge{display:inline-block;background:#7c5cfc22;color:#7c5cfc;border-radius:99px;padding:1px 7px;font-size:10px;margin-left:6px}
  .main{padding:24px 28px}
  .panel{display:none}
  .panel.active{display:block}
  .summary-bar{display:flex;gap:12px;margin-bottom:22px;flex-wrap:wrap}
  .summary-card{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:14px 18px;flex:1;min-width:140px}
  .summary-card .label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .summary-card .value{font-size:22px;font-weight:700;color:#fff}
  .summary-card .value.green{color:#22c55e}
  .summary-card .value.red{color:#ef4444}
  .summary-card .value.purple{color:#7c5cfc}
  .toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
  .search-input{background:#111;border:1px solid #222;color:#e5e5e5;padding:8px 12px;border-radius:7px;font-size:13px;width:260px;outline:none;transition:border .2s}
  .search-input:focus{border-color:#7c5cfc}
  .search-input::placeholder{color:#444}
  .filter-select{background:#111;border:1px solid #222;color:#aaa;padding:7px 10px;border-radius:7px;font-size:12px;outline:none;cursor:pointer}
  .filter-select:focus{border-color:#7c5cfc}
  .result-count{font-size:12px;color:#555;margin-left:auto}
  .table-wrap{overflow-x:auto;border-radius:10px;border:1px solid #1e1e1e}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{background:#111;padding:10px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#555;border-bottom:1px solid #1e1e1e;white-space:nowrap}
  tbody tr{border-bottom:1px solid #161616;transition:background .15s}
  tbody tr:hover{background:#161616}
  tbody tr:last-child{border-bottom:none}
  td{padding:10px 14px;vertical-align:middle;white-space:nowrap}
  td.name-col{white-space:normal;max-width:200px;font-weight:500;color:#ddd}
  td a{color:#7c5cfc;font-size:11px}
  td a:hover{text-decoration:underline}
  .pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
  .pill-green{background:#16a34a22;color:#22c55e;border:1px solid #16a34a44}
  .pill-yellow{background:#d9770622;color:#f59e0b;border:1px solid #d9770644}
  .pill-red{background:#dc262622;color:#ef4444;border:1px solid #dc262644}
  .pill-blue{background:#2563eb22;color:#60a5fa;border:1px solid #2563eb44}
  .pill-purple{background:#7c3aed22;color:#a78bfa;border:1px solid #7c3aed44}
  .pill-gray{background:#33333344;color:#888;border:1px solid #333}
  .avatar{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#7c5cfc33;color:#a78bfa;font-size:9px;font-weight:700;border:1px solid #7c5cfc44;margin-left:-4px}
  .avatar:first-child{margin-left:0}
  .avatars{display:flex;align-items:center}
  .msg-list{display:flex;flex-direction:column;gap:10px}
  .msg-card{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:14px 16px;transition:border .2s}
  .msg-card:hover{border-color:#333}
  .msg-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .msg-channel{font-size:11px;color:#7c5cfc;font-weight:600}
  .msg-user{font-size:11px;color:#555}
  .msg-time{font-size:11px;color:#444;margin-left:auto}
  .msg-text{font-size:13px;color:#ccc;line-height:1.5;word-break:break-word}
  .msg-reactions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .reaction{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:99px;padding:2px 8px;font-size:11px;color:#888}
  .empty-state{text-align:center;padding:60px 20px;color:#444}
  .empty-state .icon{font-size:40px;margin-bottom:12px}
  .empty-state p{font-size:14px}
  .loading{text-align:center;padding:40px;color:#555;font-size:13px}
  .meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .meta-card{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:16px;transition:border .2s}
  .meta-card:hover{border-color:#333}
  .meta-card-name{font-size:13px;font-weight:600;color:#ddd;margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
  .meta-row .k{color:#555}
  .meta-row .v{color:#ccc;font-weight:500}
  .meta-row .v.green{color:#22c55e}
  .meta-divider{border:none;border-top:1px solid #1e1e1e;margin:8px 0}
  .meta-period-label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .meta-card.error-card{border-color:#dc262633;opacity:.7}
  .meta-card.no-data-card{opacity:.5}
  @media(max-width:600px){.header{padding:12px 16px}.tabs{padding:12px 16px 0}.main{padding:16px}.summary-bar{gap:8px}.summary-card{min-width:120px}}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1><span>Servedia</span> Ops Dashboard</h1>
    <div class="pulled-at" id="global-pulled">Loading...</div>
  </div>
  <button class="refresh-btn" onclick="loadAll()">&#8635; Refresh</button>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('meta')">Meta Ads <span class="tab-badge" id="meta-badge">37</span></div>
  <div class="tab" onclick="switchTab('clickup')">ClickUp Tasks <span class="tab-badge" id="clickup-badge">&#8212;</span></div>
  <div class="tab" onclick="switchTab('slack')">Slack Activity <span class="tab-badge" id="slack-badge">&#8212;</span></div>
</div>
<div class="main">
  <div class="panel active" id="panel-meta">
    <div class="summary-bar" id="meta-summary"></div>
    <div class="toolbar">
      <input class="search-input" id="meta-search" placeholder="Search account name..." oninput="renderMeta()"/>
      <select class="filter-select" id="meta-filter" onchange="renderMeta()">
        <option value="all">All Accounts</option>
        <option value="active">Active Only</option>
        <option value="no_data">No Data</option>
        <option value="error">Errors</option>
      </select>
      <select class="filter-select" id="meta-period" onchange="renderMeta()">
        <option value="7">Last 7 Days</option>
        <option value="30">Last 30 Days</option>
      </select>
      <span class="result-count" id="meta-count"></span>
    </div>
    <div id="meta-content" class="loading">Loading Meta Ads data...</div>
  </div>
  <div class="panel" id="panel-clickup">
    <div class="summary-bar" id="clickup-summary"></div>
    <div class="toolbar">
      <input class="search-input" id="clickup-search" placeholder="Search task name..." oninput="renderClickup()"/>
      <select class="filter-select" id="clickup-status" onchange="renderClickup()">
        <option value="all">All Statuses</option>
        <option value="open">Open</option>
        <option value="in progress">In Progress</option>
        <option value="complete">Complete</option>
      </select>
      <select class="filter-select" id="clickup-assignee" onchange="renderClickup()">
        <option value="all">All Assignees</option>
      </select>
      <span class="result-count" id="clickup-count"></span>
    </div>
    <div id="clickup-content" class="loading">Loading ClickUp tasks...</div>
  </div>
  <div class="panel" id="panel-slack">
    <div class="summary-bar" id="slack-summary"></div>
    <div class="toolbar">
      <input class="search-input" id="slack-search" placeholder="Search messages..." oninput="renderSlack()"/>
      <select class="filter-select" id="slack-channel" onchange="renderSlack()">
        <option value="all">All Channels</option>
      </select>
      <span class="result-count" id="slack-count"></span>
    </div>
    <div id="slack-content" class="loading">Loading Slack messages...</div>
  </div>
</div>
<script>
const REPO = 'Artzy22/servedia-ops';
const BASE = 'https://raw.githubusercontent.com/' + REPO + '/main/data';
let metaData=null,clickupData=null,slackData=null;
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{const p=['meta','clickup','slack'];t.classList.toggle('active',p[i]===name);});
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
}
async function fetchJSON(url){const r=await fetch(url+'?_='+Date.now());if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
function fmt$(n){return n==null?'--':'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtN(n){return n==null?'--':Number(n).toLocaleString();}
function fmtPct(n){return n==null?'--':Number(n).toFixed(2)+'%';}
function timeAgo(ts){if(!ts)return'';const d=(Date.now()/1000)-parseFloat(ts);if(d<60)return Math.round(d)+'s ago';if(d<3600)return Math.round(d/60)+'m ago';if(d<86400)return Math.round(d/3600)+'h ago';return Math.round(d/86400)+'d ago';}
function statusPill(s){if(!s)return'<span class="pill pill-gray">--</span>';const sl=s.toLowerCase();if(sl.includes('complete')||sl.includes('done')||sl.includes('closed'))return'<span class="pill pill-green">'+s+'</span>';if(sl.includes('progress')||sl.includes('active')||sl.includes('review'))return'<span class="pill pill-blue">'+s+'</span>';if(sl.includes('block')||sl.includes('urgent'))return'<span class="pill pill-red">'+s+'</span>';if(sl.includes('open')||sl.includes('todo')||sl.includes('backlog'))return'<span class="pill pill-gray">'+s+'</span>';return'<span class="pill pill-purple">'+s+'</span>';}
function priorityPill(p){if(!p)return'';const pl=p.toLowerCase();if(pl==='urgent')return'<span class="pill pill-red">Urgent</span>';if(pl==='high')return'<span class="pill pill-yellow">High</span>';if(pl==='normal')return'<span class="pill pill-blue">Normal</span>';if(pl==='low')return'<span class="pill pill-gray">Low</span>';return'<span class="pill pill-gray">'+p+'</span>';}
async function loadMeta(){try{metaData=await fetchJSON(BASE+'/meta.json');renderMeta();}catch(e){document.getElementById('meta-content').innerHTML='<div class="empty-state"><div class="icon">!</div><p>Could not load Meta data. Run the sync-meta workflow first.</p></div>';}}
function renderMeta(){
  if(!metaData)return;
  const search=document.getElementById('meta-search').value.toLowerCase();
  const filter=document.getElementById('meta-filter').value;
  const period=document.getElementById('meta-period').value==='30'?'last_30_days':'last_7_days';
  let clients=metaData.clients||[];
  if(filter!=='all')clients=clients.filter(c=>c.status===filter);
  if(search)clients=clients.filter(c=>c.account_name.toLowerCase().includes(search));
  document.getElementById('meta-count').textContent=clients.length+' account'+(clients.length!==1?'s':'');
  document.getElementById('meta-badge').textContent=(metaData.clients||[]).length;
  document.getElementById('global-pulled').textContent=metaData.pulled_at?'Last synced: '+new Date(metaData.pulled_at).toLocaleString():'';
  const active=(metaData.clients||[]).filter(c=>c.status==='active');
  const totalSpend=active.reduce((s,c)=>s+(c[period]&&c[period].spend||0),0);
  const totalLeads=active.reduce((s,c)=>s+(c[period]&&c[period].leads||0),0);
  const totalImpr=active.reduce((s,c)=>s+(c[period]&&c[period].impressions||0),0);
  document.getElementById('meta-summary').innerHTML='<div class="summary-card"><div class="label">Active Accounts</div><div class="value purple">'+active.length+'</div></div><div class="summary-card"><div class="label">Total Spend ('+(period==='last_7_days'?'7d':'30d')+')</div><div class="value">'+fmt$(totalSpend)+'</div></div><div class="summary-card"><div class="label">Total Leads</div><div class="value green">'+fmtN(totalLeads)+'</div></div><div class="summary-card"><div class="label">Total Impressions</div><div class="value">'+fmtN(totalImpr)+'</div></div><div class="summary-card"><div class="label">Errors</div><div class="value '+(metaData.accounts_with_errors>0?'red':'')+'">'+((metaData.accounts_with_errors)||0)+'</div></div>';
  if(!clients.length){document.getElementById('meta-content').innerHTML='<div class="empty-state"><div class="icon">?</div><p>No accounts match your filters.</p></div>';return;}
  const cards=clients.map(c=>{const d=c[period]||{};const isErr=c.status==='error';const noData=c.status==='no_data';return '<div class="meta-card'+(isErr?' error-card':'')+(noData?' no-data-card':'')+'"><div class="meta-card-name" title="'+c.account_name+'">'+c.account_name+'</div>'+(isErr?'<div style="color:#ef4444;font-size:11px">Error fetching data</div>':noData?'<div style="color:#666;font-size:11px">No data</div>':'<div class="meta-period-label">'+(period==='last_7_days'?'Last 7 Days':'Last 30 Days')+'</div><div class="meta-row"><span class="k">Spend</span><span class="v">'+fmt$(d.spend)+'</span></div><div class="meta-row"><span class="k">Leads</span><span class="v green">'+fmtN(d.leads)+'</span></div><div class="meta-row"><span class="k">CPL</span><span class="v">'+(d.cost_per_lead?fmt$(d.cost_per_lead):'--')+'</span></div><hr class="meta-divider"/><div class="meta-row"><span class="k">Impressions</span><span class="v">'+fmtN(d.impressions)+'</span></div><div class="meta-row"><span class="k">Clicks</span><span class="v">'+fmtN(d.clicks)+'</span></div><div class="meta-row"><span class="k">CTR</span><span class="v">'+fmtPct(d.ctr)+'</span></div><div class="meta-row"><span class="k">CPC</span><span class="v">'+fmt$(d.cpc)+'</span></div><div class="meta-row"><span class="k">CPM</span><span class="v">'+fmt$(d.cpm)+'</span></div><div class="meta-row"><span class="k">Reach</span><span class="v">'+fmtN(d.reach)+'</span></div>')+'</div>';}).join('');
  document.getElementById('meta-content').innerHTML='<div class="meta-grid">'+cards+'</div>';
}
async function loadClickup(){try{clickupData=await fetchJSON(BASE+'/clickup.json');const assignees=[...new Set((clickupData.tasks||[]).flatMap(t=>t.assignees||[]))].filter(Boolean).sort();const sel=document.getElementById('clickup-assignee');assignees.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;sel.appendChild(o);});renderClickup();}catch(e){document.getElementById('clickup-content').innerHTML='<div class="empty-state"><div class="icon">!</div><p>Could not load ClickUp data.</p></div>';}}
function renderClickup(){
  if(!clickupData)return;
  const search=document.getElementById('clickup-search').value.toLowerCase();
  const status=document.getElementById('clickup-status').value;
  const assignee=document.getElementById('clickup-assignee').value;
  let tasks=clickupData.tasks||[];
  if(status!=='all')tasks=tasks.filter(t=>(t.status||'').toLowerCase().includes(status));
  if(assignee!=='all')tasks=tasks.filter(t=>(t.assignees||[]).includes(assignee));
  if(search)tasks=tasks.filter(t=>(t.name||'').toLowerCase().includes(search));
  document.getElementById('clickup-count').textContent=tasks.length+' task'+(tasks.length!==1?'s':'');
  document.getElementById('clickup-badge').textContent=(clickupData.tasks||[]).length;
  const all=clickupData.tasks||[];
  const open=all.filter(t=>!['complete','closed','done'].some(s=>(t.status||'').toLowerCase().includes(s)));
  document.getElementById('clickup-summary').innerHTML='<div class="summary-card"><div class="label">Total</div><div class="value purple">'+all.length+'</div></div><div class="summary-card"><div class="label">Open</div><div class="value">'+open.length+'</div></div><div class="summary-card"><div class="label">Completed</div><div class="value green">'+(all.length-open.length)+'</div></div><div class="summary-card"><div class="label">Last Synced</div><div class="value" style="font-size:13px">'+(clickupData.pulled_at?new Date(clickupData.pulled_at).toLocaleTimeString():'--')+'</div></div>';
  if(!tasks.length){document.getElementById('clickup-content').innerHTML='<div class="empty-state"><div class="icon">?</div><p>No tasks match your filters.</p></div>';return;}
  const rows=tasks.map(t=>{const due=t.due_date?new Date(parseInt(t.due_date)).toLocaleDateString():'--';const avatars=(t.assignees||[]).map(a=>'<div class="avatar" title="'+a+'">'+a.substring(0,2).toUpperCase()+'</div>').join('');return'<tr><td class="name-col">'+(t.url?'<a href="'+t.url+'" target="_blank">'+(t.name||'Untitled')+'</a>':(t.name||'Untitled'))+'</td><td>'+statusPill(t.status)+'</td><td>'+priorityPill(t.priority)+'</td><td><div class="avatars">'+(avatars||'<span style="color:#444">--</span>')+'</div></td><td>'+due+'</td><td>'+(t.list||'--')+'</td></tr>';}).join('');
  document.getElementById('clickup-content').innerHTML='<div class="table-wrap"><table><thead><tr><th>Task</th><th>Status</th><th>Priority</th><th>Assignees</th><th>Due</th><th>List</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
async function loadSlack(){try{slackData=await fetchJSON(BASE+'/slack.json');const channels=[...new Set((slackData.messages||[]).map(m=>m.channel))].filter(Boolean).sort();const sel=document.getElementById('slack-channel');channels.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent='#'+c;sel.appendChild(o);});renderSlack();}catch(e){document.getElementById('slack-content').innerHTML='<div class="empty-state"><div class="icon">!</div><p>Could not load Slack data.</p></div>';}}
function renderSlack(){
  if(!slackData)return;
  const search=document.getElementById('slack-search').value.toLowerCase();
  const channel=document.getElementById('slack-channel').value;
  let msgs=slackData.messages||[];
  if(channel!=='all')msgs=msgs.filter(m=>m.channel===channel);
  if(search)msgs=msgs.filter(m=>(m.text||'').toLowerCase().includes(search)||(m.user||'').toLowerCase().includes(search));
  document.getElementById('slack-count').textContent=msgs.length+' message'+(msgs.length!==1?'s':'');
  document.getElementById('slack-badge').textContent=slackData.total_messages_24h||(slackData.messages||[]).length;
  const chs=slackData.channels||[];
  document.getElementById('slack-summary').innerHTML='<div class="summary-card"><div class="label">Messages (24h)</div><div class="value purple">'+(slackData.total_messages_24h||0)+'</div></div><div class="summary-card"><div class="label">Channels</div><div class="value">'+chs.length+'</div></div><div class="summary-card"><div class="label">Last Synced</div><div class="value" style="font-size:13px">'+(slackData.pulled_at?new Date(slackData.pulled_at).toLocaleTimeString():'--')+'</div></div>';
  if(!msgs.length){document.getElementById('slack-content').innerHTML='<div class="empty-state"><div class="icon">~</div><p>No messages found.</p></div>';return;}
  const cards=msgs.slice(0,200).map(m=>{const reactions=(m.reactions||[]).map(r=>'<span class="reaction">:'+r.name+': '+r.count+'</span>').join('');return'<div class="msg-card"><div class="msg-header"><span class="msg-channel">#'+m.channel+'</span><span class="msg-user">'+(m.user||'bot')+'</span>'+(m.reply_count?'<span class="pill pill-blue" style="font-size:10px">'+m.reply_count+' repl'+(m.reply_count!==1?'ies':'y')+'</span>':'')+'<span class="msg-time">'+timeAgo(m.ts)+'</span></div><div class="msg-text">'+((m.text||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')||'<em style="color:#444">No text</em>')+'</div>'+(reactions?'<div class="msg-reactions">'+reactions+'</div>':'')+'</div>';}).join('');
  document.getElementById('slack-content').innerHTML='<div class="msg-list">'+cards+'</div>';
}
async function loadAll(){document.getElementById('global-pulled').textContent='Refreshing...';await Promise.all([loadMeta(),loadClickup(),loadSlack()]);}
loadAll();
</script>
</body>
</html>
