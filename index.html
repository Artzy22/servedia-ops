<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servedia Ops Center</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Bricolage+Grotesque:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--s1:#0d0d1a;--s2:#121220;--s3:#181828;--s4:#1e1e30;
  --wire:rgba(255,255,255,0.05);--wire2:rgba(255,255,255,0.09);--wire3:rgba(255,255,255,0.15);
  --ink:#e4e2f0;--ink2:#9896b0;--ink3:#5a5870;--ink4:#38364a;
  --lime:#b8ff47;--lime2:rgba(184,255,71,0.14);--lime3:rgba(184,255,71,0.05);
  --red:#ff4d6d;--red2:rgba(255,77,109,0.14);
  --amber:#ffb830;--amber2:rgba(255,184,48,0.14);
  --blue:#6b8cff;--blue2:rgba(107,140,255,0.14);
  --teal:#2dd4bf;--teal2:rgba(45,212,191,0.12);
  --mono:'IBM Plex Mono',monospace;--display:'Bricolage Grotesque',sans-serif;
  --r:5px;--r2:10px;
}
html{font-size:14px}
body{background:var(--bg);color:var(--ink);font-family:var(--display);font-weight:300;min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:9999}

/* LAYOUT */
.app{display:grid;grid-template-columns:200px 1fr;grid-template-rows:48px 1fr;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{grid-column:1/-1;display:flex;align-items:center;border-bottom:1px solid var(--wire2);background:rgba(7,7,15,0.95);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:10px;padding:0 18px;border-right:1px solid var(--wire2);height:100%;min-width:200px}
.brand-dot{width:8px;height:8px;background:var(--lime);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.brand-name{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase}
.topbar-mid{flex:1;display:flex;align-items:center;gap:20px;padding:0 20px}
.sync-status{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--ink3)}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--lime)}
.sync-dot.loading{background:var(--amber);animation:blink .5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.topbar-right{padding:0 18px;border-left:1px solid var(--wire2);height:100%;display:flex;align-items:center}
.clock{font-family:var(--mono);font-size:11px;color:var(--ink3)}

/* SIDEBAR */
.sidebar{background:var(--s1);border-right:1px solid var(--wire2);overflow-y:auto;display:flex;flex-direction:column}
.sb-sec{padding:14px 14px 6px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--ink4);text-transform:uppercase}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;border-left:2px solid transparent;transition:all .12s}
.sb-item:hover{background:var(--s2);border-left-color:var(--wire3)}
.sb-item.active{background:var(--lime3);border-left-color:var(--lime)}
.sb-left{display:flex;align-items:center;gap:8px}
.sb-icon{font-size:12px;width:14px;text-align:center}
.sb-label{font-size:12px;color:var(--ink2)}
.sb-item.active .sb-label{color:var(--ink)}
.sb-badge{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:20px;background:var(--s3);color:var(--ink3)}
.sb-badge.hot{background:var(--red2);color:var(--red)}
.sb-div{height:1px;background:var(--wire);margin:6px 14px}
.pip{width:5px;height:5px;border-radius:50%}

/* MAIN */
.main{overflow-y:auto;display:flex;flex-direction:column}

/* KPI BAR */
.kpi-bar{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--wire2);flex-shrink:0}
.kpi{padding:14px 18px;border-right:1px solid var(--wire2)}
.kpi:last-child{border-right:none}
.kpi-label{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--ink3);text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1}
.kpi-val.hot{color:var(--red)}
.kpi-val.warn{color:var(--amber)}
.kpi-val.ok{color:var(--lime)}
.kpi-sub{font-size:10px;color:var(--ink4);margin-top:3px}

/* CONTENT */
.content{flex:1;padding:18px;display:flex;flex-direction:column;gap:14px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* CARD */
.card{background:var(--s1);border:1px solid var(--wire2);border-radius:var(--r2);overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--wire2);background:var(--s2)}
.card-title{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2)}
.card-meta{font-family:var(--mono);font-size:9px;color:var(--ink4)}

/* TASK ROW */
.task-row{display:grid;grid-template-columns:3px 1fr 110px 70px 50px 24px;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--wire);cursor:default;transition:background .1s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:var(--s2)}
.pri-bar{height:26px;border-radius:2px}
.pri-urgent{background:var(--red)}
.pri-high{background:var(--amber)}
.pri-normal{background:var(--blue)}
.pri-low{background:var(--ink4)}
.task-name{font-size:12px;color:var(--ink);line-height:1.3;margin-bottom:2px}
.task-id{font-family:var(--mono);font-size:9px;color:var(--ink4)}
.task-client{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:20px;border:1px solid var(--wire3);color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
.task-status{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:20px;text-align:center}
.st-open,.st-to_do{background:var(--blue2);color:var(--blue)}
.st-in_progress{background:var(--amber2);color:var(--amber)}
.st-done,.st-complete{background:var(--teal2);color:var(--teal)}
.task-due{font-family:var(--mono);font-size:9px;color:var(--ink3);text-align:right}
.task-due.over{color:var(--red)}
.avatar{width:22px;height:22px;border-radius:50%;background:var(--s4);border:1px solid var(--wire3);display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--ink3);font-family:var(--mono)}

/* SLACK */
.slack-row{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--wire);cursor:default;transition:background .1s}
.slack-row:last-child{border-bottom:none}
.slack-row:hover{background:var(--s2)}
.slack-row.unread{background:rgba(107,140,255,0.03)}
.slack-av{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.slack-body{flex:1;min-width:0}
.slack-hdr{display:flex;align-items:baseline;gap:6px;margin-bottom:2px}
.slack-user{font-size:12px;font-weight:500}
.slack-chan{font-family:var(--mono);font-size:9px;color:var(--blue)}
.slack-time{font-family:var(--mono);font-size:9px;color:var(--ink3);margin-left:auto}
.slack-text{font-size:11px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.unread-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:4px}

/* META TABLE */
.meta-table{width:100%;border-collapse:collapse}
.meta-table th{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--ink4);text-transform:uppercase;padding:7px 12px;text-align:left;border-bottom:1px solid var(--wire2);font-weight:400}
.meta-table td{padding:7px 12px;font-size:11px;color:var(--ink2);border-bottom:1px solid var(--wire)}
.meta-table tr:last-child td{border-bottom:none}
.meta-table tr:hover td{background:var(--s2)}
.kpi-chip{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:20px}
.chip-Good{background:var(--lime2);color:var(--lime)}
.chip-Watch{background:var(--amber2);color:var(--amber)}
.chip-Borderline{background:rgba(255,140,48,.15);color:#ff9630}
.chip-Prob-Cut,.chip-Prob_Cut{background:var(--red2);color:var(--red)}
.chip-CUT{background:var(--red2);color:var(--red);font-weight:600}
.chip-NO-DATA,.chip-NO_DATA{background:var(--s3);color:var(--ink4)}
.chip-ERROR{background:var(--s3);color:var(--ink4)}

/* EMPTY */
.empty{padding:24px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--ink4);letter-spacing:.06em}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}

@media(max-width:860px){.app{grid-template-columns:1fr}.sidebar{display:none}.kpi-bar{grid-template-columns:repeat(3,1fr)}.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">Servedia Ops</span>
    </div>
    <div class="topbar-mid">
      <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Loading...</span></div>
      <div class="sync-status" style="margin-left:8px">Updated: <span style="color:var(--ink2);margin-left:4px" id="last-sync">—</span></div>
    </div>
    <div class="topbar-right">
      <div class="clock" id="clock"></div>
    </div>
  </header>

  <nav class="sidebar">
    <div class="sb-sec">Views</div>
    <div class="sb-item active" onclick="nav('overview',this)"><div class="sb-left"><span class="sb-icon">⚡</span><span class="sb-label">Overview</span></div></div>
    <div class="sb-item" onclick="nav('tasks',this)"><div class="sb-left"><span class="sb-icon">✓</span><span class="sb-label">ClickUp Tasks</span></div><span class="sb-badge hot" id="sb-tasks">—</span></div>
    <div class="sb-item" onclick="nav('slack',this)"><div class="sb-left"><span class="sb-icon">💬</span><span class="sb-label">Slack</span></div><span class="sb-badge" id="sb-slack">—</span></div>
    <div class="sb-item" onclick="nav('meta',this)"><div class="sb-left"><span class="sb-icon">📊</span><span class="sb-label">Meta KPIs</span></div></div>
    <div class="sb-div"></div>
    <div class="sb-sec">Filter by client</div>
    <div id="client-list"></div>
  </nav>

  <main class="main">
    <div class="kpi-bar">
      <div class="kpi"><div class="kpi-label">Open Tasks</div><div class="kpi-val" id="k-tasks">—</div><div class="kpi-sub">assigned to me</div></div>
      <div class="kpi"><div class="kpi-label">Urgent</div><div class="kpi-val hot" id="k-urgent">—</div><div class="kpi-sub">need action now</div></div>
      <div class="kpi"><div class="kpi-label">Unread Slack</div><div class="kpi-val warn" id="k-slack">—</div><div class="kpi-sub">messages</div></div>
      <div class="kpi"><div class="kpi-label">Flagged Accounts</div><div class="kpi-val hot" id="k-flagged">—</div><div class="kpi-sub">CPL needs attention</div></div>
      <div class="kpi"><div class="kpi-label">Avg CPL (7d)</div><div class="kpi-val ok" id="k-cpl">—</div><div class="kpi-sub">all active clients</div></div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<script>
// ── CONFIG ──
// Change this to your GitHub username/repo after pushing
const REPO = 'YOUR_GITHUB_USERNAME/servedia-ops';
const BASE = `https://raw.githubusercontent.com/${REPO}/main/data`;

// ── STATE ──
let DATA = { tasks: [], slack: [], meta: [] };
let currentView = 'overview';
let clientFilter = null;

// ── CLOCK ──
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}, 1000);

// ── FETCH ──
async function fetchJSON(path, fallback) {
  try {
    const r = await fetch(`${BASE}/${path}?t=${Date.now()}`);
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) {
    console.warn('Fetch failed:', path, e.message);
    return fallback;
  }
}

async function sync() {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.classList.add('loading');
  lbl.textContent = 'Syncing...';

  const [cu, sl, mt] = await Promise.all([
    fetchJSON('clickup.json', {tasks:[],count:0}),
    fetchJSON('slack.json',   {messages:[]}),
    fetchJSON('meta.json',    {clients:[]})
  ]);

  DATA.tasks = cu.tasks || [];
  DATA.slack = sl.messages || [];
  DATA.meta  = mt.clients || [];

  dot.classList.remove('loading');
  lbl.textContent = 'Live';
  document.getElementById('last-sync').textContent = new Date().toLocaleTimeString();

  updateMetrics();
  buildClientList();
  render();
}

// ── METRICS ──
function updateMetrics() {
  const open    = DATA.tasks.filter(t => t.status !== 'done' && t.status !== 'complete').length;
  const urgent  = DATA.tasks.filter(t => t.priority === 'urgent' && t.status !== 'done').length;
  const unread  = DATA.slack.filter(s => s.unread).length;
  const flagged = DATA.meta.filter(m => ['Prob Cut','CUT','Borderline'].includes(m.kpi_status)).length;
  const active  = DATA.meta.filter(m => m.cpl > 0);
  const avgCPL  = active.length ? (active.reduce((s,m) => s + m.cpl, 0) / active.length) : 0;

  document.getElementById('k-tasks').textContent   = open;
  document.getElementById('k-urgent').textContent  = urgent;
  document.getElementById('k-slack').textContent   = unread;
  document.getElementById('k-flagged').textContent = flagged;
  document.getElementById('k-cpl').textContent     = avgCPL ? '$' + avgCPL.toFixed(2) : '—';
  document.getElementById('sb-tasks').textContent  = open;
  document.getElementById('sb-slack').textContent  = unread;
}

// ── CLIENT LIST ──
const CLIENT_COLORS = ['#ff4d6d','#ffb830','#6b8cff','#2dd4bf','#b8ff47','#a78bfa','#f472b6','#38bdf8'];
function buildClientList() {
  const clients = [...new Set(DATA.tasks.map(t => t.client))].slice(0, 10);
  document.getElementById('client-list').innerHTML = clients.map((c,i) => `
    <div class="sb-item" onclick="filterClient('${c.replace(/'/g,"\\'")}',this)">
      <div class="sb-left">
        <div class="pip" style="background:${CLIENT_COLORS[i%CLIENT_COLORS.length]}"></div>
        <span class="sb-label" style="font-size:11px">${c}</span>
      </div>
    </div>`).join('');
}

function filterClient(c, el) {
  clientFilter = c;
  document.querySelectorAll('.sb-item').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  currentView = 'tasks';
  render();
}

// ── NAV ──
function nav(v, el) {
  currentView = v;
  clientFilter = null;
  document.querySelectorAll('.sb-item').forEach(x => x.classList.remove('active'));
  if (el) el.classList.add('active');
  render();
}

// ── RENDER ──
function render() {
  const c = document.getElementById('content');
  if (currentView === 'overview') c.innerHTML = renderOverview();
  else if (currentView === 'tasks') c.innerHTML = renderTasks();
  else if (currentView === 'slack') c.innerHTML = renderSlack();
  else if (currentView === 'meta')  c.innerHTML = renderMeta();
}

// ── HELPERS ──
function priBar(p) { return `<div class="pri-bar pri-${p}" style="width:3px"></div>`; }
function statusBadge(s) {
  const k = s.replace(/ /g,'_');
  const labels = {open:'open',to_do:'to do',in_progress:'in progress',done:'done',complete:'done'};
  return `<span class="task-status st-${k}">${labels[k]||s}</span>`;
}
function dueStr(due) {
  if (!due) return '';
  const d = new Date(due);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function isOverdue(due) {
  if (!due) return false;
  return new Date(due) < new Date();
}
function kpiChip(status) {
  const k = (status||'').replace(/ /g,'-');
  return `<span class="kpi-chip chip-${k}">${status}</span>`;
}

// ── OVERVIEW ──
function renderOverview() {
  const urgent  = DATA.tasks.filter(t => t.priority==='urgent' && t.status!=='done').slice(0,5);
  const unread  = DATA.slack.filter(s => s.unread).slice(0,5);
  const flagged = DATA.meta.filter(m => ['Prob Cut','CUT'].includes(m.kpi_status)).slice(0,6);

  return `
  <div class="two-col">
    <div class="card">
      <div class="card-head"><span class="card-title" style="color:var(--red)">● Urgent tasks</span><span class="card-meta">${urgent.length} items</span></div>
      ${urgent.length ? urgent.map(t => `
      <div class="task-row">
        ${priBar(t.priority)}
        <div><div class="task-name">${t.name}</div><div class="task-id">${t.id} · ${t.client}</div></div>
        ${statusBadge(t.status)}
        <div class="task-due ${isOverdue(t.due)?'over':''}">${dueStr(t.due)}</div>
        <div></div>
        <div class="avatar">${t.assignee||'BV'}</div>
      </div>`).join('') : '<div class="empty">No urgent tasks ✓</div>'}
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title" style="color:var(--blue)">💬 Unread Slack</span><span class="card-meta">${unread.length} unread</span></div>
      ${unread.length ? unread.map(s => `
      <div class="slack-row unread">
        <div class="slack-av" style="background:var(--blue2);color:var(--blue)">${(s.user||'?')[0].toUpperCase()}</div>
        <div class="slack-body">
          <div class="slack-hdr"><span class="slack-user">${s.user}</span><span class="slack-chan">${s.channel}</span><span class="slack-time">${s.time}</span></div>
          <div class="slack-text">${s.text}</div>
        </div>
        <div class="unread-dot"></div>
      </div>`).join('') : '<div class="empty">Inbox zero ✓</div>'}
    </div>
  </div>
  ${flagged.length ? `
  <div class="card">
    <div class="card-head"><span class="card-title" style="color:var(--red)">🚨 Flagged Meta accounts (7d)</span><span class="card-meta">${flagged.length} need attention</span></div>
    <table class="meta-table">
      <thead><tr><th>Client</th><th>Spend</th><th>Leads</th><th>CPL</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>${flagged.map(m => `
      <tr>
        <td style="color:var(--ink)">${m.client}</td>
        <td>$${m.spend}</td><td>${m.leads}</td><td>${m.cpl ? '$'+m.cpl : '—'}</td>
        <td>${kpiChip(m.kpi_status)}</td>
        <td style="font-size:10px;color:var(--ink3)">${m.cpl > 20 ? 'Review creative' : 'Monitor'}</td>
      </tr>`).join('')}</tbody>
    </table>
  </div>` : ''}`;
}

// ── TASKS ──
function renderTasks() {
  let tasks = DATA.tasks.filter(t => t.status !== 'done' && t.status !== 'complete');
  if (clientFilter) tasks = tasks.filter(t => t.client === clientFilter);
  return `
  <div class="card">
    <div class="card-head">
      <span class="card-title">✓ ${clientFilter ? clientFilter + ' tasks' : 'All open tasks'}</span>
      <span class="card-meta">${tasks.length} tasks${clientFilter ? ` · <span onclick="clientFilter=null;render()" style="cursor:pointer;color:var(--blue)">× clear</span>` : ''}</span>
    </div>
    ${tasks.length ? tasks.map(t => `
    <div class="task-row">
      ${priBar(t.priority)}
      <div><div class="task-name">${t.name}</div><div class="task-id">${t.id}${t.comments ? ' · 💬 '+t.comments : ''}</div></div>
      <div class="task-client">${t.client}</div>
      ${statusBadge(t.status)}
      <div class="task-due ${isOverdue(t.due)?'over':''}">${dueStr(t.due)}</div>
      <div class="avatar">${t.assignee||'BV'}</div>
    </div>`).join('') : '<div class="empty">No open tasks ✓</div>'}
  </div>`;
}

// ── SLACK ──
function renderSlack() {
  const msgs = DATA.slack;
  return `
  <div class="card">
    <div class="card-head"><span class="card-title">💬 Slack inbox</span><span class="card-meta">${msgs.filter(m=>m.unread).length} unread · ${msgs.length} total</span></div>
    ${msgs.length ? msgs.map(s => `
    <div class="slack-row ${s.unread?'unread':''}">
      <div class="slack-av" style="background:${s.unread?'var(--blue2)':'var(--s3)'};color:${s.unread?'var(--blue)':'var(--ink3)'}">${(s.user||'?')[0].toUpperCase()}</div>
      <div class="slack-body">
        <div class="slack-hdr"><span class="slack-user">${s.user}</span><span class="slack-chan">${s.channel}</span><span class="slack-time">${s.time}</span></div>
        <div class="slack-text">${s.text}</div>
      </div>
      ${s.unread ? '<div class="unread-dot"></div>' : '<div style="width:6px"></div>'}
    </div>`).join('') : '<div class="empty">No messages loaded</div>'}
  </div>`;
}

// ── META ──
function renderMeta() {
  const clients = DATA.meta;
  const sorted  = [...clients].sort((a,b) => {
    const o = {CUT:0,'Prob Cut':1,Borderline:2,Watch:3,Good:4,'NO DATA':5,ERROR:6};
    return (o[a.kpi_status]??9) - (o[b.kpi_status]??9);
  });
  return `
  <div class="card">
    <div class="card-head"><span class="card-title">📊 Meta KPIs — last 7 days</span><span class="card-meta">${clients.length} clients</span></div>
    <table class="meta-table">
      <thead><tr><th>Client</th><th>Spend</th><th>Leads</th><th>CPL</th><th>CPB</th><th>CTR%</th><th>Status</th></tr></thead>
      <tbody>${sorted.map(m => `
      <tr>
        <td style="color:var(--ink);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.client}</td>
        <td>$${m.spend||0}</td>
        <td>${m.leads||0}</td>
        <td style="color:${m.cpl>20?'var(--red)':m.cpl>10?'var(--amber)':m.cpl>0?'var(--lime)':'var(--ink3)'}">${m.cpl ? '$'+m.cpl : '—'}</td>
        <td style="color:${m.cpb>100?'var(--red)':'var(--ink2)'}">${m.cpb ? '$'+m.cpb : '—'}</td>
        <td>${m.ctr ? m.ctr.toFixed(2)+'%' : '—'}</td>
        <td>${kpiChip(m.kpi_status)}</td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`;
}

// ── INIT ──
sync();
setInterval(sync, 5 * 60 * 1000); // refresh every 5 min (GitHub caches raw files)
</script>
</body>
</html>
