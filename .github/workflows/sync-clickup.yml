name: Sync ClickUp Tasks

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull ClickUp tasks
        env:
          CLICKUP_API_KEY: ${{ secrets.CLICKUP_API_KEY }}
        run: |
          LIST_ID="901512199678"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://api.clickup.com/api/v2/list/${LIST_ID}/task?archived=false&include_closed=true&subtasks=true&page=0" \
            -H "Authorization: ${CLICKUP_API_KEY}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::ClickUp API returned HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi

          PULLED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "$BODY" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          tasks = data.get('tasks', [])
          output = {
            'tasks': [{
              'id': t.get('id'),
              'name': t.get('name'),
              'status': t.get('status', {}).get('status'),
              'status_color': t.get('status', {}).get('color'),
              'assignees': [a.get('username', a.get('email', '')) for a in t.get('assignees', [])],
              'priority': t.get('priority', {}).get('priority') if t.get('priority') else None,
              'due_date': t.get('due_date'),
              'date_created': t.get('date_created'),
              'date_updated': t.get('date_updated'),
              'list': t.get('list', {}).get('name'),
              'folder': t.get('folder', {}).get('name'),
              'space': t.get('space', {}).get('id'),
              'url': t.get('url'),
              'tags': [tag.get('name') for tag in t.get('tags', [])]
            } for t in tasks],
            'count': len(tasks),
            'pulled_at': '$PULLED_AT'
          }
          print(json.dumps(output, indent=2))
          " > data/clickup.json

          echo "Pulled $(python3 -c "import json; print(json.load(open('data/clickup.json'))['count'])") tasks"

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/clickup.json
          git diff --staged --quiet || git commit -m "sync clickup tasks [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
