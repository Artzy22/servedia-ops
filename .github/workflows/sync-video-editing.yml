name: Sync Video Editing Tasks

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull ClickUp Video Editing tasks
        env:
          CLICKUP_API_KEY: ${{ secrets.CLICKUP_API_KEY }}
        run: |
          LIST_ID="8cnp5x7-4995"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://api.clickup.com/api/v2/list/${LIST_ID}/task?archived=false&include_closed=true&page=0" \
            -H "Authorization: ${CLICKUP_API_KEY}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" != "200" ]; then
            echo "List endpoint failed ($HTTP_CODE), trying view endpoint..."
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              "https://api.clickup.com/api/v2/view/${LIST_ID}/task" \
              -H "Authorization: ${CLICKUP_API_KEY}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
          fi
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Both endpoints failed. HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi
          PULLED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p data
          echo "$BODY" | python3 -c "import sys,json;d=json.load(sys.stdin);t=d.get('tasks',[]);cf=lambda x,n:next((f.get('value') or f.get('value_richtext') or '' for f in x.get('custom_fields',[]) if f.get('name','').lower()==n.lower()),'');print(json.dumps({'tasks':[{'id':i.get('id'),'name':i.get('name'),'status':i.get('status',{}).get('status'),'status_color':i.get('status',{}).get('color'),'client_name':cf(i,'Client Full Name'),'assignees':[{'id':a.get('id'),'username':a.get('username'),'email':a.get('email')} for a in i.get('assignees',[])],'priority':i.get('priority',{}).get('priority') if i.get('priority') else None,'due_date':i.get('due_date'),'date_updated':i.get('date_updated'),'url':i.get('url')} for i in t],'count':len(t),'pulled_at':'${PULLED_AT}'},indent=2))" > data/video-editing.json
          echo "Synced $(python3 -c "import json; d=json.load(open('data/video-editing.json')); print(d['count'])") tasks"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/video-editing.json
          git diff --staged --quiet || git commit -m "sync video editing [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
