name: Sync Slack Messages

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull Slack messages
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, time, os, urllib.request
          token = os.environ["SLACK_BOT_TOKEN"]

          def slack_api(endpoint, params="", method="GET", body=None):
              url = f"https://slack.com/api/{endpoint}?{params}"
              headers = {
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json; charset=utf-8"
              }
              data_bytes = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, data=data_bytes, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return json.loads(r.read())
              except Exception as e:
                  return {"ok": False, "error": str(e)}

          # List all channels
          all_channels = []
          cursor = ""
          while True:
              params = f"limit=200&types=public_channel,private_channel&exclude_archived=true"
              if cursor:
                  params += f"&cursor={cursor}"
              data = slack_api("conversations.list", params)
              if not data.get("ok"):
                  print(f"Error listing channels: {data.get('error')}")
                  break
              all_channels.extend(data.get("channels", []))
              cursor = data.get("response_metadata", {}).get("next_cursor", "")
              if not cursor:
                  break
          print(f"Found {len(all_channels)} channels total")

          # Try to join public channels (silently skip failures)
          joined = 0
          for ch in all_channels:
              if not ch.get("is_private"):
                  result = slack_api("conversations.join", method="POST", body={"channel": ch["id"]})
                  if result.get("ok"):
                      joined += 1
                  time.sleep(0.05)
          print(f"Joined {joined} new public channels")

          # Pull history from ALL channels - skip those we can't access
          cutoff = str(time.time() - 86400)
          all_messages = []
          channel_summaries = []
          errors = []
          member_count = 0

          for ch in all_channels:
              ch_id = ch["id"]
              ch_name = ch.get("name", ch_id)
              params = f"channel={ch_id}&oldest={cutoff}&limit=100"
              resp = slack_api("conversations.history", params)
              if resp.get("ok"):
                  member_count += 1
                  msgs = resp.get("messages", [])
                  for m in msgs:
                      all_messages.append({
                          "channel": ch_name,
                          "channel_id": ch_id,
                          "user": m.get("user", ""),
                          "text": m.get("text", ""),
                          "ts": m.get("ts", ""),
                          "thread_ts": m.get("thread_ts"),
                          "reply_count": m.get("reply_count", 0),
                          "reactions": len(m.get("reactions", []))
                      })
                  channel_summaries.append({
                      "channel": ch_name,
                      "channel_id": ch_id,
                      "message_count_24h": len(msgs),
                      "is_private": ch.get("is_private", False),
                      "topic": ch.get("topic", {}).get("value", ""),
                      "purpose": ch.get("purpose", {}).get("value", "")
                  })
              else:
                  err = resp.get("error", "unknown")
                  if err not in ("not_in_channel", "channel_not_found", "missing_scope"):
                      errors.append({"channel": ch_name, "error": err})
              time.sleep(0.1)

          print(f"Accessible channels: {member_count}")

          import subprocess
          pulled_at = subprocess.check_output(["date","-u","+%Y-%m-%dT%H:%M:%SZ"]).decode().strip()
          output = {
              "messages": all_messages,
              "channels": channel_summaries,
              "total_messages_24h": len(all_messages),
              "total_channels": len(all_channels),
              "member_channels": member_count,
              "errors": errors,
              "pulled_at": pulled_at
          }
          with open("data/slack.json", "w") as f:
              json.dump(output, f, indent=2)
          print(f"Pulled {len(all_messages)} messages from {member_count} channels")
          PYEOF

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/slack.json
          git diff --staged --quiet || git commit -m "sync slack messages [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git pull --rebase origin main
          git push
